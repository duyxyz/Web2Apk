name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Tên hiển thị của App (VD: Tên Ứng Dụng)'
        required: false
        default: 'duyxyz'
      web_url:
        description: 'Địa chỉ Website cần nạp (VD: https://google.com/)'
        required: false
        default: 'https://duyxyz.github.io/'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Kiểm tra mã nguồn (Checkout)
        uses: actions/checkout@v4

      - name: Thiết lập cấu hình tuỳ chỉnh (App Name & URL)
        if: github.event_name == 'workflow_dispatch'
        run: |
          # Dùng NodeJS để cập nhật tên app trong app.json
          node -e "
            const fs = require('fs');
            const file = 'app.json';
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            data.expo.name = process.env.APP_NAME || data.expo.name;
            fs.writeFileSync(file, JSON.stringify(data, null, 2));
          "
          
          # Dùng sed để thay đổi đường link trong App.js
          URL="${WEB_URL:-https://duyxyz.github.io/}"
          sed -i "s|https://duyxyz.github.io/|$URL|g" App.js
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
          WEB_URL: ${{ github.event.inputs.web_url }}

      - name: Thiết lập Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Thiết lập Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Thiết lập Android SDK
        uses: android-actions/setup-android@v3

      - name: Cài đặt thư viện (npm install)
        run: npm ci

      - name: Tạo mã nguồn Android (Expo Prebuild)
        run: |
          # Chạy Expo prebuild để sinh ra mã nguồn thuần tuỳ theo app.json hiện tại
          npx expo prebuild --platform android --clean

      - name: Build ứng dụng (Assemble Debug APK)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Tải file APK lên GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name || 'app' }}-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

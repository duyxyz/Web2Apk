name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App display name (e.g., App Name)'
        required: false
        default: 'example'
      package_name:
        description: 'Package Name (e.g., com.example.app)'
        required: false
        default: 'com.example.app'
      web_url:
        description: 'Website URL to load (e.g., https://google.com/)'
        required: false
        default: 'https://www.example.com/'
      icon_url:
        description: 'Logo/Icon download link (Supports jpg, png, webp...)'
        required: false
        default: ''
      splash_url:
        description: 'Splash Screen Logo download link'
        required: false
        default: ''
      splash_color:
        description: 'Splash Background HEX Color (Default: #ffffff)'
        required: false
        default: '#ffffff'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Initialize Android platform for Flutter
        run: |
          rm -rf android
          flutter create . --platforms android --org "${PKG_NAME}" --project-name app
        env:
          PKG_NAME: ${{ github.event.inputs.package_name || 'com.example.app' }}

      - name: Change App Name and Grant Permissions
        run: |
          # Set App Label
          sed -i "s/android:label=\"app\"/android:label=\"${APP_NAME}\"/g" android/app/src/main/AndroidManifest.xml
          
          # Add permissions
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.VIBRATE" />' android/app/src/main/AndroidManifest.xml
          
          # Allow HTTP traffic
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' android/app/src/main/AndroidManifest.xml
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}

      - name: Apply New Website URL
        run: |
          URL="${WEB_URL:-https://www.example.com/}"
          sed -i "s|https://www.example.com/|$URL|g" lib/screens/web_app_screen.dart
        env:
          WEB_URL: ${{ github.event.inputs.web_url }}

      - name: Install dependencies (Pub get)
        run: flutter pub get

      - name: Download and generate App Icon automatically
        run: |
          if [ -n "$ICON_URL" ]; then
            mkdir -p assets
            curl -fL --retry 3 --connect-timeout 20 -o assets/icon-source "$ICON_URL"
            sudo apt-get update && sudo apt-get install -y imagemagick
            convert assets/icon-source -auto-orient -background none -gravity center -resize 1024x1024 -extent 1024x1024 PNG32:assets/icon.png
            
            cat <<EOF > flutter_launcher_icons.yaml
            flutter_launcher_icons:
              android: true
              ios: false
              image_path: "assets/icon.png"
            EOF
            
            dart run flutter_launcher_icons -f flutter_launcher_icons.yaml
          fi
        env:
          ICON_URL: ${{ github.event.inputs.icon_url }}

      - name: Download and generate Splash Screen automatically
        run: |
          mkdir -p assets
          COLOR="${SPLASH_COLOR:-#ffffff}"
          
          # Create base config using heredoc to ensure correct YAML formatting
          cat <<EOF > flutter_native_splash.yaml
          flutter_native_splash:
            color: "$COLOR"
            color_dark: "$COLOR"
            android: true
            android_12:
              color: "$COLOR"
              color_dark: "$COLOR"
          EOF
          
          if [ -n "$SPLASH_URL" ]; then
            curl -fL --retry 3 --connect-timeout 20 -o assets/splash-source "$SPLASH_URL"
            if ! command -v convert &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y imagemagick
            fi
            convert assets/splash-source -auto-orient -background none -gravity center -resize 1024x1024 -extent 1024x1024 PNG32:assets/icon_splash.png
            
            # Append image paths with correct indentation
            sed -i '/flutter_native_splash:/a \  image: "assets/icon_splash.png"' flutter_native_splash.yaml
            sed -i '/android_12:/a \    image: "assets/icon_splash.png"' flutter_native_splash.yaml
          fi
          
          dart run flutter_native_splash:create --path flutter_native_splash.yaml
        env:
          SPLASH_URL: ${{ github.event.inputs.splash_url }}
          SPLASH_COLOR: ${{ github.event.inputs.splash_color }}

      - name: Build application (Assemble APK Split)
        run: |
          flutter build apk --split-per-abi --release

      - name: Upload arm64-v8a file to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name || 'app' }}-arm64-v8a-release-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload armeabi-v7a file to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name || 'app' }}-armeabi-v7a-release-apk
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Tên hiển thị của App (VD: Tên Ứng Dụng)'
        required: false
        default: 'example'
      package_name:
        description: 'Tên gói ứng dụng (Package Name, VD: com.example.app)'
        required: false
        default: 'com.example.app'
      web_url:
        description: 'Địa chỉ Website cần nạp (VD: https://google.com/)'
        required: false
        default: 'https://www.example.com/'
      icon_url:
        description: 'Link tải Logo/Icon (Hỗ trợ jpg, png, webp...)'
        required: false
        default: ''

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Kiểm tra mã nguồn (Checkout)
        uses: actions/checkout@v4

      - name: Thiết lập Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Thiết lập Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Khởi tạo Android platform cho Flutter
        run: |
          # Sinh ra mã nguồn Android gốc cho Flutter
          rm -rf android
          flutter create . --platforms android --org "${PKG_NAME}" --project-name app
        env:
          PKG_NAME: ${{ github.event.inputs.package_name || 'com.example.app' }}

      - name: Đổi tên hiển thị ứng dụng (App Name)
        run: |
          # Tìm dòng chứa label mặc định đổi thành tên mới
          sed -i "s/android:label=\"app\"/android:label=\"${APP_NAME}\"/g" android/app/src/main/AndroidManifest.xml
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}

      - name: Áp dụng đường dẫn Website mới
        run: |
          # Thay thế URL trong mã nguồn Flutter
          URL="${WEB_URL:-https://www.example.com/}"
          sed -i "s|https://www.example.com/|$URL|g" lib/main.dart
        env:
          WEB_URL: ${{ github.event.inputs.web_url }}

      - name: Cài đặt thư viện (Pub get)
        run: flutter pub get

      - name: Tải tĩnh và tạo App Icon tự động
        run: |
          if [ -n "$ICON_URL" ]; then
            echo "Đang xử lý tải Icon từ: $ICON_URL"
            mkdir -p assets
            curl -L -o assets/icon.png "$ICON_URL"
            
            # Đảm bảo chuyển đổi đúng chuẩn icon.png vuông bằng ImageMagick
            sudo apt-get update
            sudo apt-get install -y imagemagick
            convert assets/icon.png -resize 1024x1024 assets/icon.png
            
            # Cấu hình plugin thay icon
            cat <<EOF > flutter_launcher_icons.yaml
            flutter_launcher_icons:
              android: true
              ios: false
              image_path: "assets/icon.png"
            EOF
            
            # Chạy công cụ sinh icon của Flutter
            dart run flutter_launcher_icons -f flutter_launcher_icons.yaml
          fi
        env:
          ICON_URL: ${{ github.event.inputs.icon_url }}

      - name: Build ứng dụng (Assemble APK Split)
        run: |
          # Chạy lệnh xuất ra 2 file APK (arm64-v8a và armeabi-v7a) riêng biệt
          flutter build apk --split-per-abi --release

      - name: Tải file arm64-v8a lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name || 'app' }}-arm64-v8a-release-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Tải file armeabi-v7a lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name || 'app' }}-armeabi-v7a-release-apk
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
